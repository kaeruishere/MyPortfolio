<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Portfolio</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body class="bg-[rgb(var(--m3-surface))] text-[rgb(var(--m3-on-surface))] min-h-screen dark">

<div id="admin-panel" class="min-h-screen">

    <!-- Login -->
    <div id="admin-login" class="min-h-screen flex items-center justify-center p-6">
        <form id="admin-login-form" class="w-full max-w-sm card-modern p-10 space-y-6 text-center rounded-[3rem]">
            <div class="space-y-2">
                <span class="material-symbols-outlined text-5xl text-[rgb(var(--m3-primary))]">lock</span>
                <h1 class="text-2xl font-black">Admin Girişi</h1>
                <p class="text-sm text-[rgb(var(--m3-on-surface))]/40">Firebase e-posta ve şifrenizle giriş yapın</p>
            </div>
            <input type="email" id="admin-email"
                class="w-full px-6 py-4 rounded-2xl bg-[rgb(var(--m3-surface-container))] border-none outline-none focus:ring-2 focus:ring-[rgb(var(--m3-primary))] transition-all text-center"
                placeholder="E-posta" autofocus required>
            <input type="password" id="admin-password"
                class="w-full px-6 py-4 rounded-2xl bg-[rgb(var(--m3-surface-container))] border-none outline-none focus:ring-2 focus:ring-[rgb(var(--m3-primary))] transition-all text-center"
                placeholder="Şifre" required>
            <button type="submit" class="w-full py-4 rounded-2xl bg-[rgb(var(--m3-primary))] text-white font-bold shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all">Panele Gir</button>
            <a href="index.html" class="block text-sm font-bold opacity-40 hover:opacity-100 transition-opacity">← Ana Siteye Dön</a>
        </form>
    </div>

    <!-- Dashboard -->
    <div id="admin-dashboard" class="hidden min-h-screen flex flex-col lg:flex-row">
        <aside class="w-full lg:w-72 bg-[rgb(var(--m3-surface-container-high))] border-r border-[rgb(var(--m3-on-surface))]/5 p-8 flex flex-col gap-6">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-black">Admin<span class="text-[rgb(var(--m3-primary))]">.</span></div>
                <a href="index.html" class="material-symbols-outlined opacity-60 hover:opacity-100 lg:hidden">close</a>
            </div>
            <nav id="admin-nav" class="flex flex-col gap-2"></nav>
            <div class="mt-auto pt-8 border-t border-[rgb(var(--m3-outline))]/10 space-y-3">
                <button id="admin-logout-btn" class="w-full py-3 rounded-2xl border border-[rgb(var(--m3-outline))]/20 text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/20 transition-all">
                    <span class="material-symbols-outlined text-sm">logout</span>Çıkış Yap
                </button>
                <a href="index.html" class="w-full py-3 rounded-2xl border border-[rgb(var(--m3-outline))]/20 text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-[rgb(var(--m3-on-surface))]/5 transition-all">
                    <span class="material-symbols-outlined text-sm">visibility</span>Siteyi Görüntüle
                </a>
                <p class="text-[10px] opacity-30 text-center">v2.0 — Firebase Firestore</p>
            </div>
        </aside>

        <main class="flex-grow p-6 sm:p-12 lg:p-16 overflow-y-auto">
            <div class="mb-10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 max-w-4xl">
                <div>
                    <h2 id="admin-tab-title" class="text-3xl font-black capitalize">Branding</h2>
                    <p class="text-[rgb(var(--m3-on-surface))]/40 text-sm">Değişiklikler otomatik kaydedilir.</p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="admin-lang-toggle" class="px-4 py-2 rounded-xl border border-[rgb(var(--m3-outline))]/20 text-xs font-bold uppercase hover:bg-[rgb(var(--m3-on-surface))]/5 transition-all">TR</button>
                    <button id="admin-save-btn" class="px-6 py-3 rounded-2xl bg-[rgb(var(--m3-primary))] text-white font-bold flex items-center gap-2 hover:opacity-90 transition-all">
                        <span class="material-symbols-outlined text-lg">save</span>Kaydet
                    </button>
                </div>
            </div>
            <div id="admin-content" class="space-y-6 max-w-4xl"></div>
        </main>
    </div>
</div>

<div id="save-toast" class="fixed bottom-6 right-6 z-[110] px-6 py-3 rounded-2xl bg-green-600 text-white font-bold shadow-lg flex items-center gap-2 transition-all duration-300 opacity-0 translate-y-4">
    <span class="material-symbols-outlined">check_circle</span>Kaydedildi ✓
</div>
<div id="admin-alert" class="fixed top-6 left-1/2 -translate-x-1/2 z-[120] px-6 py-3 rounded-2xl font-bold text-sm shadow-lg transition-all opacity-0 pointer-events-none"></div>

<script type="module" src="/src/admin.js"></script>
</body>
</html>

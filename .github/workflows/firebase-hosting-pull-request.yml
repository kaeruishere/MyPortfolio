# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject Firebase config
        run: |
          sed -i 's/%%FIREBASE_API_KEY%%/${{ secrets.FIREBASE_API_KEY }}/g' src/firebase-config.js
          sed -i 's/%%FIREBASE_AUTH_DOMAIN%%/${{ secrets.FIREBASE_AUTH_DOMAIN }}/g' src/firebase-config.js
          sed -i 's/%%FIREBASE_PROJECT_ID%%/${{ secrets.FIREBASE_PROJECT_ID }}/g' src/firebase-config.js
          sed -i 's/%%FIREBASE_STORAGE_BUCKET%%/${{ secrets.FIREBASE_STORAGE_BUCKET }}/g' src/firebase-config.js
          sed -i 's/%%FIREBASE_MESSAGING_ID%%/${{ secrets.FIREBASE_MESSAGING_ID }}/g' src/firebase-config.js
          sed -i 's/%%FIREBASE_APP_ID%%/${{ secrets.FIREBASE_APP_ID }}/g' src/firebase-config.js
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_PORTFOLIO_KAERU }}
          projectId: my-portfolio-kaeru

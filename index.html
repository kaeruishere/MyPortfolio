<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio">
  <title>Portfolio</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- CSS -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- ── Page Loader ── -->
  <div id="page-loader" aria-hidden="true">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>

  <!-- ── Navbar ── -->
  <header id="navbar" role="banner">
    <div class="nav-inner">
      <a id="nav-logo" class="nav-logo" href="#hero">~</a>

      <nav aria-label="Ana menü">
        <ul id="nav-list" class="nav-links"></ul>
      </nav>

      <div class="nav-controls">
        <button id="lang-toggle" class="nav-btn lang-btn" aria-label="Dil değiştir">EN</button>
        <button id="theme-toggle" class="nav-btn" aria-label="Tema değiştir"></button>
        <button id="nav-hamburger" class="nav-hamburger" aria-label="Menüyü aç" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <main>

    <!-- ── Hero ── -->
    <section id="hero" aria-label="Hero">
      <div class="hero-bg-grid" aria-hidden="true"></div>
      <div class="hero-bg-glow" aria-hidden="true"></div>

      <div class="container">
        <div class="hero-inner">
          <div id="hero-eyebrow" class="hero-eyebrow"></div>
          <h1 id="hero-name" class="hero-name"></h1>
          <div id="hero-title" class="hero-title"></div>
          <p id="hero-desc" class="hero-desc"></p>
          <div class="hero-actions">
            <a id="hero-cta-projects" class="btn btn-primary" href="#projects"></a>
            <a id="hero-cta-cv" class="btn btn-outline" href="#" target="_blank" style="display:none"></a>
          </div>
        </div>
      </div>

      <div class="hero-scroll-hint" aria-hidden="true">
        <span id="hero-scroll-label"></span>
        <div class="scroll-line"></div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- ── About ── -->
    <section id="about" aria-label="Hakkımda">
      <div class="container">
        <div class="about-grid">
          <div class="about-image-wrap reveal">
            <div id="about-photo"></div>
          </div>
          <div class="about-text">
            <div class="section-label">
              <span id="about-label"></span>
            </div>
            <p id="about-text-content" class="reveal"></p>
            <div class="about-actions" style="margin-top: 24px;">
              <a id="about-cv-btn" class="btn btn-outline" style="display: none;">
                <!-- JS ile dolacak -->
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- ── Education ── -->
    <section id="education" class="reveal">
      <div class="container">
        <div class="section-label" id="education-label"></div>
        <div id="education-list" class="experience-list">
          <!-- JS ile dolacak -->
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- ── Skills ── -->
    <section id="skills" aria-label="Beceriler">
      <div class="container">
        <div class="section-title reveal">
          <div class="section-label">
            <span id="skills-label"></span>
          </div>
        </div>
        <div id="skills-grid" class="skills-grid"></div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- ── Projects ── -->
    <section id="projects" aria-label="Projeler">
      <div class="container">
        <div class="section-title reveal">
          <div class="section-label">
            <span id="projects-label"></span>
          </div>
        </div>
        <div id="projects-grid" class="projects-grid"></div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- ── Experience ── -->
    <section id="experience" aria-label="Deneyim">
      <div class="container">
        <div class="section-title reveal">
          <div class="section-label">
            <span id="experience-label"></span>
          </div>
        </div>
        <div id="experience-list" class="experience-list"></div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- ── Contact ── -->
    <section id="contact" aria-label="İletişim">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info reveal">
            <div class="section-label">
              <span id="contact-label"></span>
            </div>
            <h2 id="contact-cta-title"></h2>
            <p id="contact-desc"></p>
            <div id="contact-details" class="contact-details"></div>
            <div id="contact-socials" class="contact-socials"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Footer ── -->
  <footer role="contentinfo">
    <div class="footer-inner">
      <p id="footer-copy" class="footer-copy"></p>
    </div>
  </footer>

  <!-- ── Scripts ── -->
  <script type="module" src="js/main.js"></script>
</body>
</html>

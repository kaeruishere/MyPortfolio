<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Sayfa Bulunamadı</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- CSS -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    .error-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
      position: relative;
      overflow: hidden;
    }

    .error-content {
      position: relative;
      z-index: 2;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 10rem);
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.15;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      user-select: none;
    }

    .error-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .error-desc {
      font-family: var(--font-body);
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto 2.5rem;
    }

    .hero-bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    .btn-home {
      padding: 14px 32px;
      font-size: 0.9rem;
      text-transform: uppercase;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="hero-bg-glow" aria-hidden="true"></div>
    <div class="error-code">404</div>
    
    <div class="error-content reveal visible">
      <div class="section-label" style="justify-content: center; margin-bottom: 2rem;">
        <span>Hata</span>
      </div>
      <h1 class="error-title">Aradığın sayfa kaybolmuş olabilir.</h1>
      <p class="error-desc">
        Görünüşe göre gitmek istediğin sayfa mevcut değil ya da taşınmış. 
        Endişelenme, ana sayfaya dönerek yolunu bulabilirsin.
      </p>
      <a href="/" class="btn btn-primary btn-home">
        Ana Sayfaya Dön
      </a>
    </div>
  </div>

  <script>
    // Reveal animasyonu için basit tetikleyici
    document.addEventListener('DOMContentLoaded', () => {
      const reveal = document.querySelector('.reveal');
      setTimeout(() => {
        reveal.classList.add('visible');
      }, 100);
    });
  </script>
</body>
</html>
